stop_gates:
  - stop if production behavior is edited before a corresponding expected RED
  - stop if none mode still buffers the complete SSE
  - stop if a retry or 502 occurs after downstream forwarding starts
  - stop if total deadline resets across internal attempts
  - stop if generic 5xx responses become retryable
  - stop if Windows or Unix migration rewrites a valid none or latency config
  - stop if any test targets the real 127.0.0.1:4610 gateway
verification_gates:
  - node .\scripts\test-gateway-e2e.mjs
  - node .\scripts\test-install-restore.mjs
  - node .\scripts\test-launch-ui.mjs
  - node .\scripts\test-launch-ui-unix.mjs
  - node --check .\gateway.mjs
  - node --check .\scripts\admin-lib.mjs
  - PowerShell AST parse changed scripts
  - temporary gateway process audit
  - git diff --check
