  required_agent_count: 2
  same_question: 可叠加策略是否在所有流式/非流式、重试预算、已写响应、配置迁移和详细采集边界下安全，且没有破坏 516、final-only、压缩豁免、续写与真实路由语义
  reviewer_refs:
    - agent:019f6040-55cb-7dc0-a70d-d8a5c7a03d99 => round-2 REQUEST_CHANGES, Critical=0, Important=5
    - agent:019f6040-69fe-72b0-89c9-d24b9e12b6bc => round-2 REQUEST_CHANGES, Critical=0, Important=2
    - agent:019f6040-55cb-7dc0-a70d-d8a5c7a03d99 => round-4 REQUEST_CHANGES, Critical=0, Important=4
    - agent:019f6040-69fe-72b0-89c9-d24b9e12b6bc => round-4 REQUEST_CHANGES, Critical=0, Important=4
    - agent:019f620a-6d9c-7e12-97da-7d7a905684e1 => round-5 PASS, Critical=0, Important=0, Minor=2
    - agent:019f620a-81e7-7783-a8c2-1a002493178d => round-5 REQUEST_CHANGES, Critical=0, Important=4, Minor=1
  parent_review_status: review-fix-batch-5-e2e-passed-awaiting-final-verification-and-rereview
  review_fix_evidence:
    - Retry-After deadline and 1MiB hard-limit RED reproduced
    - upload disconnect no longer becomes request_rejected 413
    - unfinished SSE framing and pre-progress buffering are bounded at 1MiB
    - non-SSE chunks mark first progress
    - timeout, Retry-After disconnect and observe-only match accounting preserve final facts
    - reordered object keys do not rewrite config or restart a healthy gateway
    - exited Windows process objects use HasExited before PID cleanup
    - Capacity HTTP 429 honors Retry-After after Capacity priority classification
    - retry wait completion rechecks total deadline against wall clock
    - byte-bounded SSE framing supports mixed LF/CR/CRLF and mislabeled JSON SSE
    - oversized protected SSE returns response_inspection_limit_exceeded instead of bypassing rules
    - observe-only timeout preserves matched_current_rule
    - next policy attempt is deadline-gated before dispatch and old retry sample closeout runs only after the next fetch ends
    - mislabeled SSE field prefixes remain framed when JSON arrives in a later chunk
    - EOF flushes complete CR-only terminal SSE events
    - protected inspection overflow disconnects after forwarding with response_inspection_limit_disconnected_after_forward
    - all four retry kinds share pending dispatch and the final total-deadline gate
    - old retry samples use captured finish time and are recorded without waiting for next headers
    - SSE field-token splits use bounded candidate/plain fallback and leading UTF-8 BOM is ignored
    - EOF-only reasoning and final-only matches disconnect instead of becoming observe-only
    - post-policy fetch failure increments failed per attempt and preserves the monitor identity
    - oversized mislabeled SSE candidates fail closed before JSON confirmation
    - standalone BOM and fallback-plus-tail preserve first-progress truth
    - body/chunk/EOF completion paths enforce wall-clock deadlines despite delayed timers
    - undispatched retry fields and old-attempt evidence bounds remain attempt-local
    - 2026-07-15 four sequential bundled-Node E2E suites PASS after latest source mutation
    - 2026-07-15 JS syntax, PowerShell AST, git diff check and temporary-process audit PASS
